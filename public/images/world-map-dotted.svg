<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none">
  <defs>
    <pattern id="dots" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#94a3b8" opacity="0.4"/>
    </pattern>
    <mask id="world-mask">
      <!-- North America -->
      <ellipse cx="250" cy="200" rx="160" ry="130" fill="white" opacity="0.9"/>
      <ellipse cx="180" cy="150" rx="80" ry="70" fill="white"/>
      <ellipse cx="300" cy="280" rx="60" ry="40" fill="white" opacity="0.7"/>
      <!-- South America -->
      <ellipse cx="320" cy="400" rx="80" ry="120" fill="white" opacity="0.85"/>
      <ellipse cx="340" cy="360" rx="50" ry="60" fill="white"/>
      <!-- Europe -->
      <ellipse cx="580" cy="170" rx="80" ry="80" fill="white" opacity="0.9"/>
      <ellipse cx="560" cy="140" rx="50" ry="40" fill="white"/>
      <!-- Africa -->
      <ellipse cx="590" cy="340" rx="80" ry="120" fill="white" opacity="0.85"/>
      <ellipse cx="610" cy="300" rx="50" ry="60" fill="white"/>
      <!-- Asia -->
      <ellipse cx="800" cy="200" rx="180" ry="120" fill="white" opacity="0.9"/>
      <ellipse cx="750" cy="180" rx="100" ry="80" fill="white"/>
      <ellipse cx="900" cy="250" rx="60" ry="50" fill="white" opacity="0.7"/>
      <!-- India/South Asia -->
      <ellipse cx="760" cy="300" rx="50" ry="60" fill="white" opacity="0.8"/>
      <!-- Southeast Asia -->
      <ellipse cx="900" cy="330" rx="60" ry="40" fill="white" opacity="0.7"/>
      <!-- Australia -->
      <ellipse cx="960" cy="430" rx="90" ry="60" fill="white" opacity="0.85"/>
      <!-- Japan/Korea -->
      <ellipse cx="960" cy="200" rx="30" ry="40" fill="white" opacity="0.8"/>
      <!-- Russia/North Asia -->
      <ellipse cx="800" cy="120" rx="200" ry="40" fill="white" opacity="0.5"/>
      <!-- Greenland -->
      <ellipse cx="380" cy="80" rx="40" ry="30" fill="white" opacity="0.6"/>
      <!-- Middle East -->
      <ellipse cx="660" cy="260" rx="40" ry="40" fill="white" opacity="0.7"/>
      <!-- Indonesia -->
      <ellipse cx="920" cy="370" rx="80" ry="20" fill="white" opacity="0.6"/>
      <!-- New Zealand -->
      <ellipse cx="1060" cy="470" rx="25" ry="30" fill="white" opacity="0.7"/>
    </mask>
  </defs>
  <rect width="1200" height="600" fill="url(#dots)" mask="url(#world-mask)"/>
</svg>
